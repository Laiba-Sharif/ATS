<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Analyzer</title>
    <!-- FontAwesome for your icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/upload.css">
    
    <!-- CSS for Loading Screen & Progress Bar (Added to prevent styling breakage) -->
    <style>
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(4px);
            display: flex; align-items: center; justify-content: center;
            z-index: 9999;
        }
        .loading-card {
            background: #ffffff; padding: 32px; border-radius: 16px;
            width: 90%; max-width: 400px; text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            font-family: inherit;
        }
        .spinner { font-size: 40px; color: #4F46E5; margin-bottom: 16px; }
        .loading-card h2 { font-size: 18px; margin-bottom: 16px; color: #0F172A; }
        .progress-bar-container { background: #F1F5F9; border-radius: 100px; height: 8px; width: 100%; overflow: hidden; margin-bottom: 8px; }
        .progress-bar-fill { background: #4F46E5; height: 100%; width: 0%; transition: width 0.3s ease; }
        .progress-subtext { font-size: 13px; color: #64748B; }
    </style>
</head>
<body>
    
<div class="navhead">

<nav class="navbar">

<div class="logo">

<h2>Resume<span>IQ AI</span></h2>

</div>

            </div>

</nav>

</header>

   <div class="resume-layout">

    <!-- LEFT SIDE: Upload & Core Actions -->
    <div class="left-panel">
        <div class="upload-card" id="uploadCard">
            <label class="drop-zone" id="dropZone">
                <input
                    type="file"
                    id="resumeFile"
                    accept=".pdf,.doc,.docx,.txt"
                    hidden>
                
                <div class="icon-wrapper">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                </div>
                <h2>Drag & Drop Resume</h2>
                <p class="file-types">Supported formats: PDF • DOCX • TXT</p>
                
                <!-- Added id="chooseBtn" back so upload.js can bind click event correctly -->
                <span id="chooseBtn" class="primary-btn fake-button">Choose Resume</span>
            </label>

            <div class="selected-file" id="selectedFile" style="display:none;">
                <i class="fa-solid fa-file-lines"></i>
                <span id="fileName">No file selected</span>
            </div>
        </div>

        <div class="analyze-box">
            <button id="analyzeBtn" class="primary-btn analyze-btn">
                Analyze Resume <i class="fa-solid fa-wand-magic-sparkles"></i>
            </button>
        </div>
    </div>

    <!-- RIGHT SIDE: Text Inputs & Matching -->
    <div class="right-panel">
        <div class="input-group resume-text-box">
            <h3>or Paste Resume Text</h3>
            <textarea id="resumeText" placeholder="Paste your complete resume content here..."></textarea>
        </div>

        <div class="input-group job-role-box">
            <h3>Target Job Role</h3>
            <div class="select-wrapper">
                <select id="jobRole">
                    <option value="" disabled selected>Select Job Role</option>
                    <option>Frontend Developer</option>
                    <option>Backend Developer</option>
                    <option>Full Stack Developer</option>
                    <option>Software Engineer</option>
                    <option>UI/UX Designer</option>
                    <option>Data Analyst</option>
                    <option>Mobile App Developer</option>
                    <option>DevOps Engineer</option>
                    <option>QA Engineer</option>
                </select>
            </div>
        </div>

        <div class="input-group job-box">
            <h3>Paste Job Description</h3>
            <textarea id="jobDescription" placeholder="Paste complete Job Description here to analyze matchmaking..."></textarea>
        </div>
    </div>

</div>

<!-- ======================================================== -->
<!-- REQUIRED LOADING SCREEN ELEMENTS FOR upload.js           -->
<!-- ======================================================== -->
<div id="loadingScreen" class="loading-overlay" style="display: none;">
    <div class="loading-card">
        <div class="spinner">
            <i class="fa-solid fa-circle-notch fa-spin"></i>
        </div>
        <h2 id="loadingStatus">Processing Engines...</h2>
        <div class="progress-bar-container">
            <div id="progressFill" class="progress-bar-fill" style="width: 0%;"></div>
        </div>
        <p id="progressText" class="progress-subtext">Initializing calculations...</p>
    </div>
</div>
